<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section powerups">
          <span class="label">POWER-UPS</span>
          <ul>
            <li><span class="pu-icon">💣</span> Bomba <span id="pu-bomb">0</span></li>
            <li><span class="pu-icon">⚡</span> Rayo <span id="pu-lightning">0</span></li>
            <li><span class="pu-icon">❄️</span> Congelar <span id="pu-freeze">0</span></li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>

        <div id="pause-menu" class="pause-menu hidden">
          <div class="pause-actions">
            <button id="resume-btn">Reanudar</button>
            <button id="pause-restart-btn">Reiniciar</button>
          </div>

          <div class="pause-option">
            <label for="start-level-select">Nivel inicial</label>
            <select id="start-level-select"></select>
          </div>

          <details class="pause-controls">
            <summary>Ver controles</summary>
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar</li>
              <li><kbd>Space</kbd> caída</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
          </details>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
